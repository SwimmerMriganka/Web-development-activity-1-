<html>
    <head>
        <title> Forms in html </title>
    </head>
    <body>
        <center><u><h1>Registration Form</h1></u></center>
        <hr>
        <form>
            <fieldset>
                <legend>
                    Personal Information
                </legend>
                <lable>Enter Your first name </lable>
                <input type="text">
                <br>
                  <br>
                  <lable> Enter your phone number </lable>
                  <input type="number">
                  <br>
                  <br>
                  <lable>Blood group </lable>
                  <input type="letters and symbols">
                  <br>
                  <br>
                  <lable> Age</lable>
                  <input type="numbers">
                  <br>
                  <br>
                  <lable> Date of birth</lable>
                  <input type="date">
                  <br>
                  <br>
                  <lable>Fathers name </lable>
                  <input type="letters">
                  <br>
                  <br>
                  <lable>Class</lable>
                  <input type="number">
                  <br>
                  <br>
                  <lable> Gender </lable>
                  <input type="radio" name="gender">Male
                  <input type="radio" name="gender">Female
                  <br>
                  <br>
                  <lable> Select Hobbies </lable>
                  <input type="checkbox">Outdoor activities
                  <input type="checkbox">Indoor Activities
                  <input type="checkbox">Reading 
                  <br>
                  <br>
                  <label> Select subject </label>
                  <select>
                    <option>Computer</option>
                    <option>English</option>
                    <option>Math</option>
                  </select>
                  <br>
                  <br>
                  <button>Submit</button>
            </fieldset>
        </form>
    </body>
</html>
